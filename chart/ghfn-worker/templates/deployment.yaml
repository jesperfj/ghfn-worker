apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-{{ .Chart.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ .Release.Name }}-{{ .Chart.Name }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: worker
          image: "ghcr.io/jesperfj/ghfn-worker:{{ default .Chart.AppVersion (.Values.image).tag }}"
          imagePullPolicy: {{ default "IfNotPresent" (.Values.image).pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            readOnlyRootFilesystem: false
          env:
            # ----------------------------------------------------------------
            # Edit these post-render. Either via `cub function do
            # set-string-path '...env[?name=="X"].value' <new-value>` (cub
            # flow) or `kubectl set env deploy/<name> X=<new-value>` (helm).
            # ----------------------------------------------------------------
            - name: CONFIGHUB_WORKER_ID
              value: confighubplaceholder
            - name: CONFIGHUB_URL
              value: https://hub.confighub.com
            - name: REPO_URL
              value: confighubplaceholder
            - name: REPO_BRANCH
              value: main
            # REPO_DIR is the worker's git clone target. It's a UID-1000-owned
            # directory baked into the image (created by the Dockerfile) — NOT
            # the volume below. Cloning into a Kubernetes-mounted volume would
            # hit git's "dubious ownership" check, since fsGroup leaves the
            # mount point root-owned. Keep this as /repo unless you also
            # update the image.
            - name: REPO_DIR
              value: /repo
            # LOCAL_REPO_PATH selects local-dev mode: when non-empty, the
            # worker skips the git clone and reads functions/ straight from
            # this path. Default empty so the chart ships in git-clone mode.
            # For local-dev: set this to /local-functions and swap the
            # emptyDir volume below to a hostPath pointing at your laptop's
            # function tree.
            - name: LOCAL_REPO_PATH
              value: ""
            # ----------------------------------------------------------------
            # Secret material — never templated into the manifest. Pre-create
            # a Secret named "<release>-<chart>-secret" with key
            # CONFIGHUB_WORKER_SECRET. Optionally add a `token` key with a
            # GitHub PAT for private repos. Edit this name post-render if you
            # want to point at a different Secret.
            # ----------------------------------------------------------------
            - name: CONFIGHUB_WORKER_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-{{ .Chart.Name }}-secret
                  key: CONFIGHUB_WORKER_SECRET
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-{{ .Chart.Name }}-secret
                  key: token
                  optional: true
          volumeMounts:
            - name: local-functions
              mountPath: /local-functions
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        # Reserved for local-dev mode: swap to a hostPath pointing at your
        # local function tree and set LOCAL_REPO_PATH=/local-functions to
        # bypass git. Stays as emptyDir in production (unused; the worker
        # clones REPO_URL into REPO_DIR=/repo, which is in the image).
        - name: local-functions
          emptyDir: {}

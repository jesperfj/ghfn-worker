name: Release

# Lockstep versioning: a git tag like `v0.2.0` triggers this workflow, which
# builds + pushes both the container image AND the Helm chart at version
# `0.2.0`. Chart.yaml's `version` and `appVersion` are set from the tag at
# package time so they stay in sync with the image tag.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: |
          # v0.2.0 -> 0.2.0
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing as version: $VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io (Docker)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push container image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/jesperfj/ghfn-worker:${{ steps.version.outputs.version }}
            ghcr.io/jesperfj/ghfn-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.15.0

      - name: Log in to ghcr.io (Helm OCI)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | helm registry login ghcr.io \
              --username ${{ github.actor }} \
              --password-stdin

      - name: Package Helm chart
        run: |
          # --version + --app-version override Chart.yaml at package time, so
          # the committed Chart.yaml stays at its `0.0.0-dev` placeholder.
          helm package chart/ghfn-worker \
            --version "${{ steps.version.outputs.version }}" \
            --app-version "${{ steps.version.outputs.version }}"
          ls -lh ghfn-worker-*.tgz

      - name: Push Helm chart to ghcr.io
        run: |
          # Push to oci://ghcr.io/jesperfj/charts so the chart lands at
          # oci://ghcr.io/jesperfj/charts/ghfn-worker:<ver>. Without the
          # `/charts` subpath, helm push would target ghcr.io/jesperfj/ghfn-worker
          # — the same OCI tag the container image just got pushed to — and
          # the chart manifest would clobber the image manifest.
          helm push \
            ghfn-worker-${{ steps.version.outputs.version }}.tgz \
            oci://ghcr.io/jesperfj/charts
